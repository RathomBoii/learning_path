{title:"Farm & Contractor Registration",chips:["FastAPI","SQLAlchemy","PostgreSQL"],
concept:"Each user is stored with a role (FARM_OWNER or CONTRACTOR) and linked to their farm entity. FastAPI's dependency injection pattern cleanly separates auth verification from business logic — you inject the current user into any route that needs it. SQLAlchemy ORM maps Python classes to Postgres tables.",

import enum
from sqlalchemy import Column, String, Enum, ForeignKey
from app.database import Base

class UserRole(str, enum.Enum):
    FARM_OWNER = "farm_owner"
    CONTRACTOR  = "contractor"
    ADMIN       = "admin"

class User(Base):
    __tablename__ = "users"
    id       = Column(String, primary_key=True)  # Firebase UID
    email    = Column(String, unique=True, nullable=False)
    role     = Column(Enum(UserRole), nullable=False)

class Farm(Base):
    __tablename__ = "farms"

{title:"Role-Based Access Control (RBAC)",chips:["Firebase Auth","JWT","FastAPI Depends"],
concept:"Firebase Auth issues a JWT token to the frontend after login. Every FastAPI request verifies that token server-side using the Firebase Admin SDK. The require_role() dependency factory wraps any route — pass in allowed roles and FastAPI auto-returns 403 if the caller's role is not in the list.",
code:`# deps/auth.py
from fastapi import Depends, HTTPException
from fastapi.security import HTTPBearer
from firebase_admin import auth, credentials
import firebase_admin

firebase_admin.initialize_app(credentials.ApplicationDefault())
security = HTTPBearer()

async def get_current_user(token=Depends(security), db=Depends(get_db)):
    try:
        decoded = auth.verify_id_token(token.credentials)
        user = db.query(User).filter_by(id=decoded["uid"]).first()
        if not user:
            raise HTTPException(404, "User not found")
        return user
    except Exception:
        raise HTTPException(401, "Invalid or expired token")

def require_role(*roles: UserRole):
    def checker(u=Depends(get_current_user)):
        if u.role not in roles:
            raise HTTPException(403, "Insufficient permissions")
        return u
    return checker

# Usage in any router:
@router.get("/contractors")
async def list_contractors(
    _=Depends(require_role(UserRole.FARM_OWNER, UserRole.ADMIN))
):
    ...`},

{title:"Contract CRUD + State Machine",chips:["FastAPI","Pydantic","State Pattern"],
concept:"A Contract moves through a defined lifecycle: DRAFT → SENT → SIGNED → ACTIVE → COMPLETED. The state machine pattern enforces valid transitions at the service layer, not the API layer. Pydantic v2 models validate incoming request bodies and serialize outgoing responses automatically.",
code:`# models/contract.py
class ContractStatus(str, enum.Enum):
    DRAFT="draft"; SENT="sent"; SIGNED="signed"
    ACTIVE="active"; COMPLETED="completed"; CANCELLED="cancelled"

TRANSITIONS = {
    ContractStatus.DRAFT:     [ContractStatus.SENT, ContractStatus.CANCELLED],
    ContractStatus.SENT:      [ContractStatus.SIGNED, ContractStatus.CANCELLED],
    ContractStatus.SIGNED:    [ContractStatus.ACTIVE],
    ContractStatus.ACTIVE:    [ContractStatus.COMPLETED],
}

def transition(contract, new_status: ContractStatus):
    allowed = TRANSITIONS.get(contract.status, [])
    if new_status not in allowed:
        raise ValueError(f"Invalid: {contract.status} → {new_status}")
    contract.status = new_status
    return contract

# schemas/contract.py (Pydantic v2)
class ContractCreate(BaseModel):
    contractor_id: UUID
    crop_type:     str
    area_rai:      float = Field(gt=0)
    price_per_kg:  Decimal = Field(gt=0, decimal_places=2)
    season_start:  date
    season_end:    date

    @model_validator(mode="after")
    def end_after_start(self):
        if self.season_end <= self.season_start:
            raise ValueError("season_end must be after season_start")
        return self`},

from app.routers import contracts, users, harvests

{title:"PostgreSQL Schema + Alembic Migrations",chips:["PostgreSQL","Alembic","Cloud SQL"],
concept:"Alembic is SQLAlchemy's database migration tool — it tracks schema changes in versioned Python files, letting you upgrade or rollback safely. Think of it like git for your database schema. Every new column or table gets its own migration file, which Cloud Build runs automatically before deploying the new API version.",
code:`# Run once to init:  alembic init alembic

# alembic/versions/002_add_harvest.py
import sqlalchemy as sa
from alembic import op

def upgrade():
    op.create_table("harvests",
        sa.Column("id",          sa.UUID(),    primary_key=True),
        sa.Column("contract_id", sa.UUID(),    sa.ForeignKey("contracts.id")),
        sa.Column("weight_kg",   sa.Float(),   nullable=False),
        sa.Column("quality",     sa.String(1)),        # A / B / C
        sa.Column("harvest_date",sa.Date(),    nullable=False),
        sa.Column("photo_gcs",   sa.String()), # gs://bucket/path
        sa.Column("recorded_at", sa.DateTime(),server_default=sa.func.now()),
    )
    op.create_index("ix_harvest_contract", "harvests", ["contract_id"])
    op.create_index("ix_harvest_date",     "harvests", ["harvest_date"])

def downgrade():
    op.drop_table("harvests")`},

import { cookies } from "next/headers"

async function getContracts() {

  const res = await fetch(\`\${process.env.API_URL}/api/v1/contracts\`, {

{title:"Pub/Sub Event Streaming",chips:["Pub/Sub","Event-Driven","Python SDK"],
concept:"Instead of services calling each other directly (tight coupling), each service publishes events to a Pub/Sub topic. Other services subscribe and react asynchronously. When a harvest is logged via the API, it publishes to harvest-events — both the Dataflow pipeline and the notification service consume it independently without knowing about each other.",
code:`# events/publisher.py
from google.cloud import pubsub_v1
import json, logging
from datetime import datetime, timezone

publisher = pubsub_v1.PublisherClient()

def publish(topic: str, event_type: str, payload: dict) -> str:
    topic_path = publisher.topic_path("your-project", topic)
    message = {
        "event_type": event_type,
        "occurred_at": datetime.now(timezone.utc).isoformat(),
        "payload": payload
    }
    future = publisher.publish(
        topic_path,
        json.dumps(message).encode("utf-8"),
        event_type=event_type        # message attribute for filtering
    )
    msg_id = future.result()
    logging.info(f"Published {event_type} → {msg_id}")
    return msg_id

# Usage inside the harvest service:
def log_harvest(data: HarvestCreate, db: Session):
    harvest = Harvest(**data.model_dump())
    db.add(harvest); db.commit()

    publish("harvest-events", "harvest.logged", {
        "harvest_id":   str(harvest.id),
        "contract_id":  str(harvest.contract_id),
        "weight_kg":    harvest.weight_kg,
        "quality":      harvest.quality,
        "harvest_date": harvest.harvest_date.isoformat(),
    })
    return harvest`},

{title:"Cloud Dataflow Streaming Pipeline",chips:["Apache Beam","Dataflow","BigQuery"],
concept:"Apache Beam provides a unified API for both batch and streaming data. A PCollection is like a lazy list of records flowing through transforms (ParDo, GroupBy, Window). The same Python code runs locally for testing and on Dataflow workers at scale. The pipeline reads from Pub/Sub continuously and writes to BigQuery in micro-batches.",
code:`# pipelines/harvest_stream.py
import apache_beam as beam
from apache_beam.options.pipeline_options import PipelineOptions, StandardOptions
import json

class ParseEvent(beam.DoFn):
    def process(self, raw: bytes):
        msg = json.loads(raw.decode("utf-8"))
        p   = msg["payload"]
        yield {
            "harvest_id":   p["harvest_id"],
            "contract_id":  p["contract_id"],
            "weight_kg":    float(p["weight_kg"]),
            "quality":      p["quality"],
            "harvest_date": p["harvest_date"],
            "ingested_at":  msg["occurred_at"],
        }

def run():
    opts = PipelineOptions([
        "--project=your-project",
        "--runner=DataflowRunner",
        "--region=asia-southeast1",
        "--streaming",                        # continuous mode
        "--temp_location=gs://agrichain-tmp/",
    ])
    opts.view_as(StandardOptions).streaming = True

    with beam.Pipeline(options=opts) as p:
        (p
         | "Read"  >> beam.io.ReadFromPubSub(
                topic="projects/your-project/topics/harvest-events")
         | "Parse" >> beam.ParDo(ParseEvent())
         | "Write" >> beam.io.WriteToBigQuery(
                "your-project:agrichain.harvest_stream",
                write_disposition=beam.io.BigQueryDisposition.WRITE_APPEND,
                create_disposition=beam.io.BigQueryDisposition.CREATE_NEVER)
        )`},

{title:"BigQuery Star Schema (Data Warehouse)",chips:["BigQuery","SQL","Data Modeling"],
concept:"A star schema separates measurable facts (harvest weight, payment amount) from descriptive dimensions (date, crop, farm). This makes analytics queries 10–100x faster than querying your normalized Postgres tables. The Thai Buddhist calendar year (พ.ศ.) is added to dim_date to support Thai reporting requirements.",
code:`-- Fact table: one row per harvest event
CREATE TABLE agrichain.fact_harvests (
  harvest_id       STRING     NOT NULL,
  contract_id      STRING     NOT NULL,
  farm_id          STRING     NOT NULL,
  contractor_id    STRING     NOT NULL,
  date_id          INT64      NOT NULL,   -- FK → dim_date
  crop_id          INT64      NOT NULL,   -- FK → dim_crop
  weight_kg        FLOAT64,
  quality_grade    STRING,                -- A / B / C
  price_per_kg     FLOAT64,
  total_payment    FLOAT64,               -- computed at load time
  ingested_at      TIMESTAMP
)
PARTITION BY DATE(ingested_at)            -- auto-partition by date
CLUSTER BY farm_id, crop_id;              -- faster farm-level queries

-- Date dimension with Thai Buddhist year
CREATE TABLE agrichain.dim_date AS
SELECT
  FORMAT_DATE('%Y%m%d', d)             AS date_id,
  d                                    AS full_date,
  EXTRACT(YEAR  FROM d)                AS year_ce,
  EXTRACT(YEAR  FROM d) + 543          AS year_be,  -- พ.ศ.
  EXTRACT(MONTH FROM d)                AS month,
  FORMAT_DATE('%B', d)                 AS month_name,
  EXTRACT(QUARTER FROM d)              AS quarter
FROM UNNEST(GENERATE_DATE_ARRAY('2020-01-01','2030-12-31')) AS d;

-- Example analytics query
SELECT c.crop_name_th, SUM(f.total_payment) AS revenue,
       AVG(f.weight_kg / 1000)              AS avg_ton_per_harvest
FROM agrichain.fact_harvests f
JOIN agrichain.dim_crop c USING (crop_id)
WHERE d.year_be = 2568           -- Thai year 2568
GROUP BY 1 ORDER BY 2 DESC;`},

{title:"Airflow DAG — Nightly ETL",chips:["Cloud Composer","Airflow","DAG"],
concept:"A DAG (Directed Acyclic Graph) defines tasks and their dependencies. Cloud Composer (managed Airflow on GCP) runs your DAGs on schedule. The ETL pattern here is ELT — Extract from Postgres to GCS as JSON, Load to BigQuery raw table, Transform inside BigQuery using SQL. This avoids heavy compute in the middle layer.",
code:`# dags/etl_postgres_to_bq.py
from airflow import DAG
from airflow.providers.google.cloud.transfers.postgres_to_gcs import PostgresToGCSOperator
from airflow.providers.google.cloud.transfers.gcs_to_bigquery import GCSToBigQueryOperator
from airflow.providers.google.cloud.operators.bigquery import BigQueryInsertJobOperator
from pendulum import datetime

with DAG(
    dag_id="etl_agrichain_daily",
    schedule="0 2 * * *",          # 2am daily (Bangkok = UTC+7)
    start_date=datetime(2025,1,1, tz="Asia/Bangkok"),
    catchup=False,
    tags=["agrichain","etl"],
) as dag:

    extract = PostgresToGCSOperator(
        task_id="extract_contracts",
        postgres_conn_id="agrichain_postgres",
        sql="SELECT * FROM contracts WHERE updated_at::date = '{{ ds }}'",
        bucket="agrichain-datalake",
        filename="raw/contracts/{{ ds }}/data.json",
        export_format="json",
    )

    load = GCSToBigQueryOperator(
        task_id="load_to_bq",
        bucket="agrichain-datalake",
        source_objects=["raw/contracts/{{ ds }}/data.json"],
        destination_project_dataset_table="agrichain.contracts_raw",
        source_format="NEWLINE_DELIMITED_JSON",
        write_disposition="WRITE_APPEND",
        autodetect=True,
    )

    transform = BigQueryInsertJobOperator(
        task_id="transform_to_facts",
        configuration={"query":{"query": """
            INSERT INTO agrichain.fact_harvests
            SELECT h.id, h.contract_id, c.farm_id, ...
            FROM agrichain.harvests_raw h
            JOIN agrichain.contracts_raw c USING(contract_id)
            WHERE DATE(h.ingested_at) = '{{ ds }}'
        """, "useLegacySql": False}},
    )

    extract >> load >> transform`},

{title:"Harvest & Yield Tracking API",chips:["FastAPI","GCS","Time-series"],
concept:"Contractors submit harvest records with weight, quality grade, and optionally a photo. Photos go directly to GCS (via a signed URL pattern — the client uploads directly to GCS, bypassing your API server, which keeps Cloud Run costs low). Yield-per-rai is computed on the fly from the contract's area_rai for the dashboard.",
code:`# routers/harvests.py
from google.cloud import storage

storage_client = storage.Client()

def generate_upload_url(filename: str) -> str:
    """Signed URL so client uploads photo directly to GCS."""
    bucket = storage_client.bucket("agrichain-photos")
    blob   = bucket.blob(f"harvests/{filename}")
    return blob.generate_signed_url(
        version="v4", expiration=timedelta(minutes=15), method="PUT",
        content_type="image/jpeg",
    )

@router.post("/harvests", response_model=HarvestResponse)
async def log_harvest(
    data: HarvestCreate,
    db: Session = Depends(get_db),
    user: User   = Depends(require_role(UserRole.CONTRACTOR)),
):
    contract = db.query(Contract).filter_by(
        id=data.contract_id, contractor_id=user.id,
        status=ContractStatus.ACTIVE
    ).first()
    if not contract:
        raise HTTPException(404, "Active contract not found")

    harvest = Harvest(**data.model_dump(), recorded_by=user.id)
    harvest.yield_per_rai = harvest.weight_kg / contract.area_rai  # computed
    db.add(harvest); db.commit(); db.refresh(harvest)

    publish("harvest-events", "harvest.logged", harvest.to_dict())
    upload_url = generate_upload_url(f"{harvest.id}.jpg")
    return HarvestResponse(**harvest.__dict__, photo_upload_url=upload_url)`},

{title:"Payment Calculation Engine",chips:["Service Layer","Decimal","Thai Tax"],
concept:"Payment logic lives in a pure Python service class — no FastAPI, no SQLAlchemy. This makes it independently testable and reusable in both the API and the Airflow batch job. Python's Decimal type (not float) is critical for financial calculations to avoid floating-point rounding errors. Thai withholding tax (ภาษีหัก ณ ที่จ่าย) for agriculture is 3%.",
code:`# services/payment.py
from decimal import Decimal, ROUND_HALF_UP
from dataclasses import dataclass

GRADE_BONUS = {"A": Decimal("0.10"), "B": Decimal("0.05"), "C": Decimal("0.00")}
WITHHOLDING_TAX = Decimal("0.03")   # Thai law: 3% for agricultural income

@dataclass
class PaymentBreakdown:
    total_weight_kg: float
    base_amount:     Decimal
    quality_bonus:   Decimal
    gross_amount:    Decimal
    tax_deducted:    Decimal
    net_amount:      Decimal  # amount actually paid to contractor

class PaymentService:
    def calculate(self, contract, harvests: list) -> PaymentBreakdown:
        base = sum(
            Decimal(str(h.weight_kg)) * contract.price_per_kg
            for h in harvests
        )
        bonus = sum(
            Decimal(str(h.weight_kg)) * contract.price_per_kg
            * GRADE_BONUS[h.quality_grade]
            for h in harvests
        )
        gross = (base + bonus).quantize(Decimal("0.01"), ROUND_HALF_UP)
        tax   = (gross * WITHHOLDING_TAX).quantize(Decimal("0.01"), ROUND_HALF_UP)

        return PaymentBreakdown(
            total_weight_kg=sum(h.weight_kg for h in harvests),
            base_amount=base, quality_bonus=bonus,
            gross_amount=gross, tax_deducted=tax,
            net_amount=gross - tax,
        )`},

{title:"Price Recommendation Engine",chips:["pandas","Prophet","BigQuery"],
concept:"Price recommendation uses time-series forecasting on historical crop prices stored in BigQuery. Facebook's Prophet library (now available standalone) handles Thai seasonal patterns well — it models yearly cycles like planting/harvest seasons without manual feature engineering. The recommendation API compares the forecast with the contractor's proposed price and flags contracts priced below market.",
code:`# services/price_recommender.py
from prophet import Prophet
from google.cloud import bigquery
import pandas as pd

class PriceRecommender:
    def get_forecast(self, crop_type: str, target_date: str) -> dict:
        bq = bigquery.Client()
        df = bq.query(f"""
            SELECT full_date AS ds, AVG(price_per_kg) AS y
            FROM agrichain.fact_harvests f
            JOIN agrichain.dim_date d USING (date_id)
            JOIN agrichain.dim_crop  c USING (crop_id)
            WHERE c.crop_name_en = '{crop_type}'
            GROUP BY ds ORDER BY ds
        """).to_dataframe()
        df["ds"] = pd.to_datetime(df["ds"])

        model = Prophet(
            yearly_seasonality=True,
            weekly_seasonality=False,   # crop prices don't vary weekly
            changepoint_prior_scale=0.1,
        )
        model.fit(df)

        future = model.make_future_dataframe(periods=90)
        forecast = model.predict(future)
        target = forecast[forecast["ds"] == target_date].iloc[0]

        return {
            "crop_type":        crop_type,
            "target_date":      target_date,
            "recommended_price": round(target["yhat"], 2),
            "lower_bound":       round(target["yhat_lower"], 2),
            "upper_bound":       round(target["yhat_upper"], 2),
        }`},

def write_gauge(metric_type: str, value: float, labels: dict):
    series = monitoring_v3.TimeSeries()
    series.metric.type = f"{METRIC}/{metric_type}"
    series.metric.labels.update(labels)

function showPhase(id, btn) {
  document.querySelectorAll(".phase-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".ptab").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

function toggle(card) {
  const body = card.querySelector(".feat-body");
  const chev = card.querySelector(".chev");
  const isOpen = body.classList.contains("open");
  const panel = card.closest(".phase-panel");
  panel.querySelectorAll(".feat-body").forEach(b => b.classList.remove("open"));
  panel.querySelectorAll(".chev").forEach(c => c.classList.remove("open"));
  if (!isOpen) { body.classList.add("open"); chev.classList.add("open"); }
}

function renderPhase(phaseId, numClass) {
  const list = document.getElementById(phaseId + "-list");
  DATA[phaseId].forEach((f, i) => {
    const card = document.createElement("div");
    card.className = "feat-card";
    card.onclick = () => toggle(card);
    const chips = f.chips.map(c => `<span class="chip">${c}</span>`).join("");
    const escaped = f.code
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    card.innerHTML = `
      <div class="feat-header">
        <span class="feat-num ${numClass}">${i+1}</span>
        <span class="feat-title">${f.title}</span>
        <div class="feat-chips">${chips}</div>
        <span class="chev">▶</span>
      </div>
      <div class="feat-body">
        <div class="concept-box">
          <div class="concept-label">Technical Concept</div>
          <div class="concept-text">${f.concept}</div>
        </div>
        <div class="code-box">
          <div class="code-label">Implementation Example</div>
          <div class="code-wrap">
            <pre><code class="language-python">${escaped}</code></pre>
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });
}
